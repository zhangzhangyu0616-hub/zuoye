<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VR 幼儿园 - 室内教室</title>
  
  <script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.js"></script>
  <script>if (window.WebXRPolyfill) new WebXRPolyfill();</script>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  
  <link rel="prefetch" href="index.html">

  <style>
    #proximity-hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
      padding: 12px 24px; background: rgba(255, 152, 0, 0.92); backdrop-filter: blur(10px);
      border-radius: 30px; color: #ffffff; font-size: 16px; font-weight: bold;
      letter-spacing: 1px; display: none; pointer-events: none;
    }
    #fade-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; opacity: 1; pointer-events: none;
      transition: opacity 0.5s ease; z-index: 99999;
    }
    /* 室内强制显示面板 */
    #vr-hud, #ai-dialogue-box { display: block !important; }
  </style>
</head>

<body>
  <div id="fade-overlay"></div>
  <div id="proximity-hint">⏳ 靠近中...</div>

  <div id="portrait-warning">
    <div class="phone-icon">📱</div>
    <h2>请旋转手机</h2>
  </div>



  <div id="vr-hud">
    📦 <b>安全动画库:</b> [ <span id="hud-anims" style="color:white">读取中...</span> ]<br>
    👂 <b>实时语音输入:</b> <span id="hud-speech" style="color:white; font-size:15px;">📡 正在初始化...</span>
  </div>

  <div id="ai-dialogue-box">
    <div id="ai-speaker">🧸 多多</div>
    <div id="ai-text">欢迎来到VR幼儿园！转身凝视门就可以出去哦。</div>
  </div>

  <a-scene background="color: #FFFDF9" renderer="antialias: true; colorManagement: true" vr-mode-ui="enabled: true" gltf-model="dracoDecoderPath: https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/libs/draco/gltf/;">
    
    <a-assets id="scene-assets">
      <a-asset-item id="evn" src="./assets/evn.glb"></a-asset-item>
      <a-asset-item id="table" src="./assets/table.glb"></a-asset-item>
      <a-asset-item id="bear-model" src="./assets/my_bear.glb"></a-asset-item>
      <a-asset-item id="pen" src="./assets/pen.glb"></a-asset-item>
      <a-asset-item id="board" src="./assets/board.glb"></a-asset-item>
      <a-asset-item id="door" src="./assets/door.glb"></a-asset-item>
      <img id="fish" src="./assets/fish.png" />
      <img id="sea" src="./assets/sea.png" />
      <img id="rightdoor" src="./assets/蓝地.png" />
    </a-assets>

    <a-ambient-light intensity="1.0" color="#ffffff"></a-ambient-light>
    <a-directional-light position="0 30 10" intensity="0.6" color="#ffffff"></a-directional-light>

    <a-entity id="rig" position="0 2.6 8">
      <a-camera look-controls>
        <a-cursor raycaster="objects: .gaze-target; interval: 100" geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025" material="color: #FF69B4; shader: flat"></a-cursor>
      </a-camera>
    </a-entity>

    <a-entity id="bear" gltf-model="#bear-model" bear-native-core></a-entity>
    <a-entity gltf-model="#evn" position="0 0.1 -5" scale="6 6 6"></a-entity>
    <a-entity gltf-model="#table" position="6.5 0 1.7" scale="5.5 5.5 5.5" rotation="0 90 0"></a-entity>
    <a-entity gltf-model="#pen" position="6 0.02 6" scale="1.5 1.5 1.5"></a-entity>
    <a-entity gltf-model="#board" position="-3 0.5 6" scale="1.5 1.5 1.5"></a-entity>

    <a-entity gltf-model="#door" position="0 0 14.5" scale="7 7 7" rotation="0 180 0"></a-entity>
    <a-sphere class="gaze-target" data-switch-target="door" position="0 2.5 14.5" radius="3.2" material="color: #ffffff; transparent: true; opacity: 0.0"></a-sphere>

    <a-cylinder position="0 6 0" radius="15" height="12" open-ended="true" theta-length="120" rotation="0 120 0" color="#3F6B3A" side="double" segments-radial="32" material="roughness: 0.5;"></a-cylinder>
    <a-cylinder position="0 6 0" radius="15" height="12" open-ended="true" theta-length="120" rotation="0 -120 0" color="#8FE8FF" side="double" segments-radial="32" material="roughness: 0.5;"></a-cylinder>
    <a-cylinder position="0 6 0" radius="15" height="12" open-ended="true" theta-length="120" rotation="0 0 0" color="#247BFF" side="double" segments-radial="32" material="roughness: 0.5;"></a-cylinder>

    <a-circle position="0 0 0" rotation="-90 0 0" radius="15" color="#FFFFCC"></a-circle>
    <a-circle position="0 12 0" rotation="90 0 0" radius="15" color="#FFFFCC"></a-circle>
    <a-circle position="1 0.03 10.5" rotation="-90 0 0" radius="4.2" color="#D8BFD8"></a-circle>
    <a-circle position="8.3 0.02 1.5" rotation="-90 0 0" radius="7" material="src: #rightdoor; side: double"></a-circle>
    <a-plane position="14.2 6 2" rotation="0 -90 0" width="12" height="10" material="src: #sea; transparent: true; side: double"></a-plane>
    <a-plane position="11 7 -6" rotation="0 -84 0" width="8" height="5" material="src: #fish; transparent: true; side: double"></a-plane>

  </a-scene>

  <script src="config.js"></script>
  <script src="bear-component.js"></script>
  <script src="collider-component.js"></script>
  <script src="tts-service.js"></script>
  <script src="main.js"></script>
  <script src="script.js"></script>
</body>
</html>
